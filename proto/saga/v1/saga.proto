syntax = "proto3";

package saga.v1;

option go_package = "github.com/ngaddam369/saga-conductor/proto/saga/v1";

import "google/protobuf/timestamp.proto";

// ── Status enums ──────────────────────────────────────────────────────────────

enum SagaStatus {
  SAGA_STATUS_UNSPECIFIED   = 0;
  SAGA_STATUS_PENDING       = 1;
  SAGA_STATUS_RUNNING       = 2;
  SAGA_STATUS_COMPENSATING  = 3;
  SAGA_STATUS_COMPLETED     = 4;
  SAGA_STATUS_FAILED        = 5;
  // SAGA_STATUS_ABORTED is set by the AbortSaga RPC. Terminal state.
  SAGA_STATUS_ABORTED       = 6;
}

enum StepStatus {
  STEP_STATUS_UNSPECIFIED          = 0;
  STEP_STATUS_PENDING              = 1;
  STEP_STATUS_RUNNING              = 2;
  STEP_STATUS_SUCCEEDED            = 3;
  STEP_STATUS_FAILED               = 4;
  STEP_STATUS_COMPENSATING         = 5;
  STEP_STATUS_COMPENSATED          = 6;
  STEP_STATUS_COMPENSATION_FAILED  = 7;
}

// ── Domain messages ───────────────────────────────────────────────────────────

message StepDefinition {
  // Human-readable step name; must be unique within a saga.
  string name = 1;
  // URL the orchestrator POSTs to when executing the step.
  string forward_url = 2;
  // URL the orchestrator POSTs to when compensating the step.
  string compensate_url = 3;
  // Maximum seconds to wait for a step HTTP response (0 = server default).
  int32 timeout_seconds = 4;
}

message StepExecution {
  string     name         = 1;
  StepStatus status       = 2;
  string     error        = 3;
  google.protobuf.Timestamp started_at   = 4;
  google.protobuf.Timestamp completed_at = 5;
  // error_detail is a JSON-encoded StepError with structured context for failed
  // steps (HTTP status code, response body excerpt, network error flag,
  // duration). Present only when status is FAILED or COMPENSATION_FAILED.
  bytes      error_detail = 6;
}

message SagaExecution {
  string     id           = 1;
  string     name         = 2;
  SagaStatus status       = 3;
  repeated StepExecution steps = 4;
  // Opaque payload forwarded verbatim to every step and compensation endpoint.
  bytes      payload      = 5;
  string     failed_step  = 6;
  google.protobuf.Timestamp created_at   = 7;
  google.protobuf.Timestamp started_at   = 8;
  google.protobuf.Timestamp completed_at = 9;
}

// ── RPC request / response messages ──────────────────────────────────────────

message CreateSagaRequest {
  string name    = 1;
  repeated StepDefinition steps   = 2;
  bytes  payload = 3;
  // saga_timeout_seconds is the per-saga execution deadline in seconds.
  // If non-zero it overrides the server-wide SAGA_TIMEOUT_SECONDS env var.
  // Valid range: 1–86400 (24 h). Zero means use the server default.
  int32  saga_timeout_seconds = 4;
}

message CreateSagaResponse {
  SagaExecution saga = 1;
}

message StartSagaRequest {
  string saga_id = 1;
}

message StartSagaResponse {
  SagaExecution saga = 1;
}

message GetSagaRequest {
  string saga_id = 1;
}

message GetSagaResponse {
  SagaExecution saga = 1;
}

message ListSagasRequest {
  // Optional filter by status; unspecified = return all.
  SagaStatus status = 1;
  // Maximum number of sagas to return. Clamped to [1, 1000]; default 100 when
  // zero or unset.
  int32 page_size = 2;
  // Opaque cursor returned as next_page_token by the previous call. Empty
  // string requests the first page.
  string page_token = 3;
}

message ListSagasResponse {
  repeated SagaExecution sagas = 1;
  // Opaque cursor for the next page. Empty when this is the last page.
  string next_page_token = 2;
}

message AbortSagaRequest {
  string saga_id = 1;
}

message AbortSagaResponse {
  SagaExecution saga = 1;
}

// ── Service ───────────────────────────────────────────────────────────────────

service SagaOrchestrator {
  // Register a saga definition. Returns it in PENDING state.
  rpc CreateSaga(CreateSagaRequest) returns (CreateSagaResponse);

  // Begin executing a PENDING saga. Steps are executed synchronously
  // in order; compensation fires automatically on step failure.
  // Returns after the saga reaches a terminal state (COMPLETED or FAILED).
  rpc StartSaga(StartSagaRequest) returns (StartSagaResponse);

  // Retrieve current state of any saga.
  rpc GetSaga(GetSagaRequest) returns (GetSagaResponse);

  // List sagas, optionally filtered by status.
  rpc ListSagas(ListSagasRequest) returns (ListSagasResponse);

  // Forcibly abort a non-terminal saga. Marks it ABORTED immediately.
  // No compensation is triggered. Also available via POST /admin/sagas/{id}/abort.
  rpc AbortSaga(AbortSagaRequest) returns (AbortSagaResponse);
}
